kind: silica
checks: [rdf, adf, coordination, density, msd, nve_drift, sq_fsdp]
thresholds:
  density_g_cm3: {target: 2.20, tolerance: 0.03}
  msd_diffusive: false            # expect a non-diffusive glass plateau at the validation temperature
  nve_drift_meV_per_atom_per_ns: {max_abs: 1.0}
  adf_deg:
    O-Si-O: {target: 109.4, tolerance: 3}
    Si-O-Si: {target: 141, tolerance: 5}
notes: >
  This is a case-specific profile. Reuse an observable only when its validator
  and protocol apply to the new run; add a validator for new observables.
