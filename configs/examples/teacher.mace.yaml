# IMPLEMENTED BUT UNVERIFIED EXAMPLE — the construction branch exists in
# adapters/teacher.py, but this toolkit has not demonstrated an end-to-end
# MACE portability run yet.
kind: mace
checkpoint: /path/to/mace-mp-0.model     # or a fine-tuned checkpoint of your own
calculator:
  module: mace.calculators
  class: MACECalculator
  env: distill-teacher-mace
  kwargs: {device: cpu}          # change explicitly to cuda for a GPU run
architecture:
  variant: MACE-MP-0            # or your own fine-tune
  cutoff_angstrom: 6.0           # check the specific release's default
emits_stress: true               # MACE calculators generally expose stress; verify for your checkpoint
fixed: true
