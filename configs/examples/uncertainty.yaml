kind: committee-force-std   # sigma_F: per-atom force std across the N student-committee seeds
aggregate: max              # per-frame score = max over atoms (use "mean" for a softer ranking)
# Honesty note (see validation/committee_uncertainty.py and the manuscript SI):
# sigma_F ranks WHERE the student diverges from ITS OWN TEACHER (fidelity), and is
# only rank-correlated (not magnitude-correlated) with the teacher's own DFT error.
# Do not report it as calibrated uncertainty or as a teacher-quality estimator.
