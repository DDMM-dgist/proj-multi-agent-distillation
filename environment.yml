# Minimal environment for the model-independent controller, adapters, mock
# workflow, and validation utilities. Teacher/student/MD/reference packages
# belong in run- or case-specific environments selected by workflow stage `env`.

name: distillation-workflow
channels: [conda-forge]
dependencies:
  - python=3.10
  - pip
  - numpy>=1.24
  - scipy>=1.10
  - pyyaml>=6.0
  - ase>=3.22
  - pip:
      - -e .
