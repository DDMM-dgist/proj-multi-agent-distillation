# Conda environment — versions verified for the SiO2 / Allegro / SIMPLE-NN
# reference case. If you plug in a different teacher/student `kind`, you will
# likely need a DIFFERENT environment for that model (e.g. a MACE install) —
# see the note in configs/README.md. Multiple environments (one per model
# family) is normal and expected; adapters/ resolves which python interpreter
# to invoke per `configs/*.yaml` (see the `env` field in each config).
#
# This project historically used THREE separate conda envs rather than one
# shared one, because the teacher/student/augmentation tools pin conflicting
# dependency versions:
#   - teacher (nequip/allegro) training + inference
#   - student (simple-nn) training + inference
#   - augmentation (augment-atoms) — an older, separate nequip install
#
# Adjust names/channels for your own teacher/student combination.

name: distill-teacher-allegro
channels:
  - conda-forge
  - pytorch
  - nvidia
dependencies:
  - python=3.10
  - pip
  - pytorch=2.6
  - pytorch-cuda=12.1
  - ase>=3.22
  - numpy
  - scipy
  - pyyaml
  - pip:
      - nequip==0.15.*
      - allegro==0.7.1

